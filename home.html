<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحبك ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#ff758c;
--secondary:#ff7eb3;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:linear-gradient(135deg,var(--primary),var(--secondary));
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
overflow:hidden;
transition:2s;
padding:20px;
position:relative;
}

/* خلفية ليلية */
body.night{
background:linear-gradient(135deg,#0f1020,#1e2a5e,#3b2f72);
}

/* نجوم وقلوب */
.bg-item{
position:fixed;
pointer-events:none;
z-index:0;
animation:floatUp linear forwards;
opacity:.8;
}

@keyframes floatUp{
0%{transform:translateY(0) scale(.7);opacity:0}
20%{opacity:1}
100%{transform:translateY(-120vh) scale(1.4);opacity:0}
}

/* اسم ديدا */
#didaGlow{
position:fixed;
top:8%;
left:50%;
transform:translateX(-50%);
font-size:55px;
font-weight:bold;
opacity:.08;
z-index:0;
text-shadow:
0 0 5px #fff,
0 0 10px #ffb6d5,
0 0 20px #ff5ca8;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{opacity:.05;transform:translateX(-50%) scale(1)}
to{opacity:.13;transform:translateX(-50%) scale(1.04)}
}

/* popup ترحيب */
#welcome{
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%);
background:#fff;
color:#ff4b7d;
padding:14px 22px;
border-radius:30px;
font-weight:bold;
z-index:999;
box-shadow:0 10px 30px rgba(0,0,0,.2);
opacity:0;
transition:1s;
}

#welcome.show{
opacity:1;
top:50px;
}

/* الصندوق */
.container{
background:rgba(255,255,255,.15);
padding:35px 20px;
border-radius:30px;
backdrop-filter:blur(15px);
max-width:470px;
width:92%;
text-align:center;
border:1px solid rgba(255,255,255,.3);
box-shadow:0 15px 35px rgba(0,0,0,.2);
position:relative;
z-index:2;
}

h1{margin:0 0 15px;font-size:28px}

.intro{
line-height:1.8;
font-size:18px;
min-height:70px;
}

button.action{
padding:12px 18px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:#fff;
color:#ff4b7d;
font-weight:bold;
margin:7px;
}

#countLove{
margin-top:10px;
font-weight:bold;
font-size:20px;
}
</style>
</head>

<body>

<div id="didaGlow">ديدا</div>
<div id="welcome">مرحبًا بأجمل ديدا في الدنيا ❤️</div>

<div class="container">

<h1 id="mainTitle">لأجمل ديدا ❤️</h1>

<p class="intro" id="typedText"></p>

<button class="action" onclick="dailyMsg()">رسالة اليوم 💌</button>

<button class="action" onclick="loveCount()">❤️ بحبك كام مرة؟</button>
<div id="countLove">0</div>

</div>

<script>
const typedText=document.getElementById("typedText");
const mainTitle=document.getElementById("mainTitle");

/* رسائل الدخول */
const introMsgs=[
"وجودك في حياتي نعمة كبيرة ❤️",
"كل يوم معاكي بحبك أكتر 😍",
"أجمل صدفة حصلتلي اني عرفتك 💖",
"إنتي راحتي وسندي وكل دنيتي 🫶",
"أنا فخور بيكي ❤️",
"وجودك بيهون الدنيا 😍",
"بحب تفاصيلك كلها 💖",
"أنتي أحلى حاجة حصلتلي ✨"
];

/* رسالة اليوم */
function dailyMsg(){
const msg=introMsgs[Math.floor(Math.random()*introMsgs.length)];
typedText.innerText=msg;
}

/* أول تحميل */
window.onload=()=>{
dailyMsg();
showWelcome();
nightMode();
setInterval(createBackground,600);
setInterval(randomHeartRain,7000);
};

/* popup */
function showWelcome(){
const box=document.getElementById("welcome");
box.classList.add("show");

setTimeout(()=>{
box.classList.remove("show");
},2500);
}

/* موود ليلي من 12 ل 7 */
function nightMode(){
const h=new Date().getHours();

if(h>=0 && h<7){
document.body.classList.add("night");
}
}

/* نجوم وقلوب بالخلفية */
function createBackground(){

const item=document.createElement("div");
item.className="bg-item";

const starChance=Math.random();

if(starChance<0.75){
item.innerHTML="✦";   // نجوم أكثر
item.style.fontSize=(10+Math.random()*12)+"px";
}else{
item.innerHTML=["❤️","💕","💖"][Math.floor(Math.random()*3)];
item.style.fontSize=(14+Math.random()*10)+"px";
}

item.style.left=Math.random()*100+"vw";
item.style.bottom="-30px";
item.style.animationDuration=(6+Math.random()*5)+"s";

document.body.appendChild(item);

setTimeout(()=>item.remove(),11000);
}

/* مطر قلوب ناعم أحيانًا */
function randomHeartRain(){

for(let i=0;i<8;i++){

setTimeout(()=>{

const h=document.createElement("div");
h.className="bg-item";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.bottom="-20px";
h.style.fontSize=(16+Math.random()*12)+"px";
h.style.animationDuration=(5+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),9000);

},i*250);

}
}

/* عداد الحب */
let c=0;

function loveCount(){
c++;
document.getElementById("countLove").innerText=c+" مرة ولسه 😍";
}
</script>

</body>
</html>
