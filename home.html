<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحبك ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Tajawal',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:#fff;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* اسم الخلفية */
.name-bg{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:80px;
opacity:.05;
font-weight:bold;
pointer-events:none;
}

/* أقسام */
section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* الكونتينر */
.box{
background:rgba(255,255,255,.15);
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
max-width:520px;
width:95%;
text-align:center;
}

/* أزرار */
button{
margin:8px;
padding:12px 16px;
border:none;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

.action{
background:#fff;
color:#ff4b7d;
}

/* قسم الذكريات */
.timeline{
list-style:none;
padding:0;
text-align:right;
border-right:2px solid rgba(255,255,255,.5);
margin-top:20px;
}

.timeline li{
padding-right:15px;
margin-bottom:15px;
}

.date{
display:inline-block;
background:rgba(0,0,0,.2);
padding:3px 8px;
border-radius:6px;
font-size:13px;
margin-bottom:5px;
}

/* زر الرجوع */
.back-btn{
background:#fff;
color:#ff4b7d;
}
</style>
</head>

<body>

<div class="name-bg">ديدا</div>

<!-- ========== القسم الأول ========== -->
<section id="home">

<div class="box">

<h2>لأجمل ديدا ❤️</h2>

<p>من يوم ما دخلتي حياتي والدنيا بقت أحلى 🫶</p>

<button class="action" onclick="openGift()">افتحي المفاجأة 🎁</button>

<button class="action" onclick="goMemory()">❤️ افتحي عالم تاني</button>

</div>

</section>

<!-- popup -->
<div id="popup" style="
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.6);
">

<div style="
background:#fff;
color:#ff4b7d;
padding:25px;
border-radius:20px;
text-align:center;
font-weight:bold;
max-width:300px;
">
أنا محظوظ إنك في حياتي ❤️<br>
الجاي أجمل ✨
<br><br>
<button onclick="closeGift()">إغلاق</button>
</div>

</div>

<!-- ========== القسم الثاني ========== -->
<section id="memory">

<div class="box">

<h2>ذكرياتنا ❤️</h2>

<p>كل لحظة معاكي ليها معنى ✨</p>

<ul class="timeline">
<li><span class="date">24/11/2024</span> أول مرة شوفتك ❤️</li>
<li><span class="date">24/12/2024</span> بداية كلامنا 📩</li>
<li><span class="date">07/02/2026</span> رحلة اسكندرية 🏖️</li>
<li><span class="date">14/02/2026</span> لحظة العمر 🤝</li>
</ul>

<button class="back-btn" onclick="goHome()">🔙 رجوع</button>

</div>

</section>

<script>

/* مفاجأة */
function openGift(){
document.getElementById("popup").style.display="flex";
}

function closeGift(){
document.getElementById("popup").style.display="none";
}

/* انتقال ناعم */
function goMemory(){
document.getElementById("memory").scrollIntoView({behavior:"smooth"});
}

function goHome(){
document.getElementById("home").scrollIntoView({behavior:"smooth"});
}

/* قلوب عند الضغط */
document.addEventListener("click",(e)=>{
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.style.position="fixed";
heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";
heart.style.fontSize="20px";
heart.style.pointerEvents="none";
heart.style.animation="up 2s linear forwards";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),2000);
});

/* أنيميشن القلوب */
const style=document.createElement("style");
style.innerHTML=`
@keyframes up{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-120px);opacity:0}
}`;
document.head.appendChild(style);

</script>

</body>
</html>
