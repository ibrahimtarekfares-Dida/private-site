<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحبك ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#ff758c;
--secondary:#ff7eb3;
}

*{box-sizing:border-box}

html,body{
margin:0;
padding:0;
height:100%;
font-family:'Tajawal',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
color:#fff;
}

/* الخلفية الثابتة */
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
z-index:-3;
}

/* ================= CANVAS ================= */
#sky{
position:fixed;
inset:0;
z-index:-2;
}

/* ================= PAGES ================= */
.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
opacity:0;
transform:scale(0.95) rotateY(20deg);
transition:1s ease;
pointer-events:none;
}

.page.active{
opacity:1;
transform:scale(1) rotateY(0deg);
pointer-events:auto;
}

/* ================= 3D TRANSITION OVERLAY ================= */
#portal{
position:fixed;
inset:0;
background:radial-gradient(circle,#fff 0%,#ff4b7d 40%,#000 100%);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
animation:none;
}

.portal-circle{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #fff;
animation:spin 1s linear infinite, expand 1s ease forwards;
box-shadow:0 0 40px #fff;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

@keyframes expand{
0%{transform:scale(0.2)}
100%{transform:scale(20)}
}

/* ================= PAGE BOX ================= */
.container{
background:rgba(255,255,255,.15);
padding:25px;
border-radius:25px;
backdrop-filter:blur(12px);
max-width:520px;
width:95%;
text-align:center;
z-index:2;
}

/* buttons */
button{
padding:10px 15px;
border:none;
border-radius:25px;
margin:5px;
font-weight:bold;
cursor:pointer;
}

.action{
background:#fff;
color:#ff4b7d;
}

/* particles */
.particle{
position:fixed;
pointer-events:none;
animation:fly 3s linear forwards;
z-index:10;
}

@keyframes fly{
0%{transform:translateY(0) scale(.6);opacity:1}
100%{transform:translateY(-200px) scale(1.5);opacity:0}
}

/* timeline */
.timeline{
text-align:right;
border-right:2px solid rgba(255,255,255,.5);
padding-right:15px;
}

.timeline li{
list-style:none;
margin-bottom:15px;
position:relative;
}

.timeline li::before{
content:"❤️";
position:absolute;
right:-18px;
}

/* meter */
.meter{
height:20px;
background:rgba(255,255,255,.2);
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#fff;
transition:2s;
}

/* watermark */
.watermark{
position:fixed;
bottom:10px;
left:10px;
font-size:11px;
opacity:.6;
transform:rotate(-90deg);
}

/* loader glitch fix */
#loader{
position:fixed;
inset:0;
background:#ff758c;
z-index:999;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* overlay */
#overlay{
position:fixed;
inset:0;
background:#ff758c;
display:none;
justify-content:center;
align-items:center;
z-index:998;
}

</style>
</head>

<body>

<canvas id="sky"></canvas>

<!-- ================= PORTAL ================= -->
<div id="portal">
<div class="portal-circle"></div>
</div>

<!-- ================= PAGE 1 ================= -->
<div class="page active" id="page1">

<div class="container">

<h2>لأجمل ديدا ❤️</h2>

<button class="action" onclick="loveCount()">حب ❤️</button>
<div id="count"></div>

<button class="action" onclick="openGift()">مفاجأة 🎁</button>

<button class="action" onclick="goWorld()">افتحي العالم التاني 🌌</button>

</div>
</div>

<!-- ================= PAGE 2 ================= -->
<div class="page" id="page2">

<div class="container">

<h2>العالم التاني ❤️</h2>

<p id="timer"></p>

<button class="action" onclick="showLove()">قد إيه بحبك 😍</button>

<div class="meter">
<div class="fill" id="fill"></div>
</div>

<div id="loveText"></div>

<ul class="timeline">
<li>أول مرة شوفتك ❤️</li>
<li>بداية الكلام 💬</li>
<li>أجمل ذكريات 🏖️</li>
<li>خطوة العمر 🤝</li>
</ul>

<button class="action" onclick="back()">رجوع ⬅️</button>

</div>
</div>

<!-- watermark -->
<div class="watermark">Made with Love ❤️</div>

<script>

/* ============ FIX BACKGROUND STABILITY ============ */
document.body.style.background="linear-gradient(135deg,#ff758c,#ff7eb3)";

/* ============ PAGE SWITCH WITH 3D PORTAL ============ */
function goWorld(){
showPortal(()=>{
page1.classList.remove("active");
page2.classList.add("active");
startTimer();
});
}

function back(){
showPortal(()=>{
page2.classList.remove("active");
page1.classList.add("active");
});
}

/* ============ PORTAL ANIMATION ============ */
function showPortal(callback){
const portal=document.getElementById("portal");
portal.style.display="flex";

setTimeout(()=>{
callback();
},700);

setTimeout(()=>{
portal.style.display="none";
},1200);
}

/* ============ LOVE COUNTER ============ */
let c=0;
function loveCount(){
c++;
count.innerText=c+" ❤️";
}

/* ============ LOVE METER ============ */
function showLove(){
fill.style.width="100%";
loveText.innerText="1000000% ❤️😍";
}

/* ============ TIMER ============ */
const startDate=new Date("2024-11-24");

function startTimer(){
setInterval(()=>{
const now=new Date();
const diff=now-startDate;

const d=Math.floor(diff/86400000);
const h=Math.floor(diff/3600000)%24;
const m=Math.floor(diff/60000)%60;
const s=Math.floor(diff/1000)%60;

timer.innerText=`${d} يوم ${h} ساعة ${m} دقيقة ${s} ثانية ❤️`;
},1000);
}

/* ============ PORTAL PARTICLES FIXED ============ */
document.addEventListener("click",(e)=>{
let el=document.createElement("div");
el.className="particle";
el.innerHTML="❤️";
el.style.left=e.clientX+"px";
el.style.top=e.clientY+"px";
document.body.appendChild(el);
setTimeout(()=>el.remove(),3000);
});

/* ============ SIMPLE SKY FIX ============ */
const canvas=document.getElementById("sky");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<100;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
s.y+=0.3;
if(s.y>canvas.height)s.y=0;
});

requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
