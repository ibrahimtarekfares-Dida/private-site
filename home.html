<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحبك ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#ff758c;
--secondary:#ff7eb3;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:#fff;
overflow-x:hidden;
}

/* الصفحات */
.page{
display:none;
min-height:100vh;
justify-content:center;
align-items:center;
padding:20px;
}

.page.active{display:flex}

/* صندوق */
.container{
background:rgba(255,255,255,.15);
padding:25px;
border-radius:25px;
backdrop-filter:blur(12px);
max-width:520px;
width:95%;
text-align:center;
position:relative;
}

/* أزرار */
button{
padding:12px 18px;
border:none;
border-radius:25px;
margin:6px;
font-weight:bold;
cursor:pointer;
}

.action{
background:#fff;
color:#ff4b7d;
}

/* ================= قلوب ================= */
.particle{
position:fixed;
pointer-events:none;
animation:fly 3s linear forwards;
font-size:22px;
}

@keyframes fly{
0%{transform:translateY(0) scale(.6);opacity:1}
100%{transform:translateY(-200px) scale(1.5);opacity:0}
}

/* ================= الصفحة الثانية ================= */
.meter{
height:20px;
background:rgba(255,255,255,.3);
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#fff;
transition:2s;
}

.timeline{
text-align:right;
border-right:2px solid #fff;
padding-right:15px;
margin-top:20px;
}

.timeline li{
list-style:none;
margin-bottom:15px;
position:relative;
}

.timeline li::before{
content:"❤️";
position:absolute;
right:-18px;
top:0;
}

.date{
background:rgba(0,0,0,.2);
padding:3px 8px;
border-radius:6px;
font-weight:bold;
display:inline-block;
margin-bottom:5px;
}

/* ================= عداد الوقت ================= */
#timer{
margin-top:10px;
font-weight:bold;
direction:ltr;
}

/* ================= العلامة المائية ================= */
.watermark{
position:fixed;
bottom:8px;
left:10px;
font-size:11px;
opacity:.6;
transform:rotate(-90deg);
transform-origin:left bottom;
white-space:nowrap;
}

/* ================= popup ================= */
#popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#fff;
color:#ff4b7d;
padding:20px;
border-radius:20px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<!-- ============== الصفحة 1 ============== -->
<div class="page active" id="page1">

<div class="container">

<h2>لأجمل ديدا ❤️</h2>

<p>كل حاجة هنا معمولة علشانك ✨</p>

<button class="action" onclick="loveCount()">❤️ بحبك كام مرة؟</button>
<div id="count"></div>

<button class="action" onclick="openGift()">افتحي المفاجأة 🎁</button>

<button class="action" onclick="goWorld()">افتحي عالم تاني ❤️</button>

</div>
</div>

<!-- ============== الصفحة 2 ============== -->
<div class="page" id="page2">

<div class="container">

<h2>العالم التاني ❤️</h2>

<p>ذكرياتنا اللي ما بتتنساش ✨</p>

<div id="timer">تحميل...</div>

<br>

<button class="action" onclick="showLove()">قد إيه بحبك؟ 😍</button>

<div class="meter">
<div class="fill" id="fill"></div>
</div>

<div id="loveText"></div>

<ul class="timeline">
<li><span class="date">24/11/2024</span> أول مرة شوفتك ❤️</li>
<li><span class="date">24/12/2024</span> بداية الكلام 💬</li>
<li><span class="date">07/02/2026</span> أجمل ذكريات 🏖️</li>
<li><span class="date">14/02/2026</span> خطوة العمر 🤝</li>
</ul>

<button class="action" onclick="back()">رجوع ❤️</button>

</div>
</div>

<!-- popup -->
<div id="popup">
<div class="popup-box">
أنا محظوظ إنك في حياتي ❤️<br>
الجاي أجمل ✨<br><br>
<button onclick="closeGift()">إغلاق</button>
</div>
</div>

<!-- العلامة المائية -->
<div class="watermark">صُنعت بكل الحب ❤️</div>

<script>

/* ====== حب عداد ====== */
let c=0;
function loveCount(){
c++;
document.getElementById("count").innerText=c+" مرة ولسه 😍";
}

/* ====== مفاجأة ====== */
function openGift(){
popup.style.display="flex";
}

function closeGift(){
popup.style.display="none";
}

/* ====== تنقل الصفحات ====== */
function goWorld(){
page1.classList.remove("active");
page2.classList.add("active");
startTimer();
}

function back(){
page2.classList.remove("active");
page1.classList.add("active");
}

/* ====== حب ====== */
function showLove(){
fill.style.width="100%";
loveText.innerText="1000000% حب ❤️😍";
}

/* ====== عداد الثواني (الكامل زي ما طلبت) ====== */
const startDate = new Date("2024-11-24T00:00:00");

function startTimer(){
setInterval(updateTimer,1000);
updateTimer();
}

function updateTimer(){
const now=new Date();
const diff=now-startDate;

const d=Math.floor(diff/86400000);
const h=Math.floor(diff/3600000)%24;
const m=Math.floor(diff/60000)%60;
const s=Math.floor(diff/1000)%60;

timer.innerText = `${d} يوم، ${h} ساعة، ${m} دقيقة، ${s} ثانية ❤️`;
}

/* ====== قلوب ====== */
document.addEventListener("click",(e)=>{
let el=document.createElement("div");
el.className="particle";
el.innerHTML=["❤️","💖","💕","💘"][Math.floor(Math.random()*4)];
el.style.left=e.clientX+"px";
el.style.top=e.clientY+"px";
document.body.appendChild(el);
setTimeout(()=>el.remove(),3000);
});

</script>

</body>
</html>
