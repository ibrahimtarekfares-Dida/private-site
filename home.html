<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحبك ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Tajawal',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
overflow:hidden;
transition:2s;
padding:20px;
}

canvas{
position:fixed;
inset:0;
z-index:0;
}

.container{
position:relative;
z-index:2;
background:rgba(255,255,255,.15);
padding:30px;
border-radius:25px;
backdrop-filter:blur(10px);
max-width:500px;
width:95%;
text-align:center;
opacity:0;
transform:translateY(20px);
transition:1s;
}

.container.show{
opacity:1;
transform:translateY(0);
}

button{
cursor:pointer;
border:none;
border-radius:25px;
padding:10px 15px;
font-weight:bold;
margin:5px;
}

.action{
background:#fff;
color:#ff4b7d;
}

#popup{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.6);
z-index:999;
}

.popup-box{
background:#fff;
color:#ff4b7d;
padding:20px;
border-radius:20px;
text-align:center;
font-weight:bold;
}

.particle{
position:fixed;
pointer-events:none;
animation:fly 3s linear forwards;
font-size:20px;
}

@keyframes fly{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-200px);opacity:0}
}
</style>
</head>

<body>

<canvas id="sky"></canvas>

<div class="container" id="mainContainer">

<h2>لأجمل ديدا ❤️</h2>

<p id="typed"></p>

<button class="action" onclick="dailyMessage()">رسالة اليوم ❤️</button>
<div id="dailyBox"></div>

<br>

<button class="action" onclick="loveCount()">قد إيه بحبك؟ 😍</button>
<div id="loveBox"></div>

<br>

<button class="action" onclick="openGift()">افتحي المفاجأة 🎁</button>

</div>

<div id="popup" onclick="this.style.display='none'">
<div class="popup-box">
أنا محظوظ إنك في حياتي ❤️<br>
الجاي أجمل ✨
</div>
</div>

<script>

/* ====== تشغيل الصفحة ====== */
window.onload=()=>{
document.getElementById("mainContainer").classList.add("show");
startSky();
};

/* ====== عداد حب ====== */
let love=0;
function loveCount(){
love++;
document.getElementById("loveBox").innerText=`بحبك ${love} مرة ولسه 😍`;
}

/* ====== رسائل يومية ====== */
const messages=[
"وجودك في حياتي نعمة كبيرة ❤️",
"كل يوم معاكي بحبك أكتر 😍",
"أجمل صدفة حصلتلي اني عرفتك 💖",
"إنتي راحتي وسندي وكل دنيتي 🫶",
"أنتي أحلى حاجة حصلتلي ✨"
];

function dailyMessage(){
let d=new Date().getDate();
document.getElementById("dailyBox").innerText=
messages[d % messages.length];
}

/* ====== نجوم ====== */
function startSky(){
const c=document.getElementById("sky");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*2
});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);

for(let s of stars){
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y+=0.3;
if(s.y>c.height)s.y=0;
}

requestAnimationFrame(draw);
}
draw();
}

/* ====== مفاجأة ====== */
function openGift(){
document.getElementById("popup").style.display="flex";
}

/* ====== قلوب + نجوم عند الضغط ====== */
document.addEventListener("click",(e)=>{
let el=document.createElement("div");
el.className="particle";
el.innerHTML=Math.random()>0.5?"❤️":"⭐";
el.style.left=e.clientX+"px";
el.style.top=e.clientY+"px";
document.body.appendChild(el);

setTimeout(()=>el.remove(),3000);
});

</script>

</body>
</html>
