<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحبك ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri:ital@1&display=swap" rel="stylesheet">

<style>
:root{
--primary:#ff758c;
--secondary:#ff7eb3;
--glass:rgba(255,255,255,.16);
--glass-border:rgba(255,255,255,.28);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Tajawal',sans-serif;
background:linear-gradient(135deg,var(--primary),var(--secondary));
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
overflow-x:hidden;
color:#fff;
transition:background 2s linear;
position:relative;
}

/* الوضع الليلي */
body.night{
background:linear-gradient(135deg,#1d1135,#3a1c71,#6a0572);
}

/* الخلفية */
.bg-layer{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
overflow:hidden;
}

/* شاشة التحميل */
#loadingScreen{
position:fixed;
inset:0;
background:#ff5d8f;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10000;
font-size:22px;
font-weight:700;
gap:15px;
}

.loadbar{
width:260px;
height:18px;
border-radius:20px;
background:rgba(255,255,255,.2);
overflow:hidden;
}

.loadfill{
height:100%;
width:0%;
background:#fff;
animation:loadit 2.8s forwards;
}

@keyframes loadit{
from{width:0}
to{width:100%}
}

/* شاشة البداية */
#overlay{
position:fixed;
inset:0;
background:rgba(255,117,140,.95);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

#overlay button{
border:none;
padding:16px 28px;
border-radius:50px;
font-size:clamp(18px,4vw,24px);
font-family:'Tajawal',sans-serif;
font-weight:700;
cursor:pointer;
background:#fff;
color:#ff4b7d;
box-shadow:0 10px 30px rgba(0,0,0,.15);
animation:pulse 1.4s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

/* الصندوق */
.container{
position:relative;
z-index:5;
width:100%;
max-width:520px;
background:var(--glass);
backdrop-filter:blur(14px);
border:1px solid var(--glass-border);
border-radius:28px;
padding:22px;
box-shadow:0 15px 40px rgba(0,0,0,.18);
opacity:0;
transform:translateY(25px);
transition:1s ease;
}

.container.show{
opacity:1;
transform:translateY(0);
}

h1{
font-size:clamp(24px,5vw,32px);
text-align:center;
margin-bottom:14px;
}

.intro{
text-align:center;
line-height:1.9;
font-size:18px;
min-height:95px;
margin-bottom:18px;
}

.counter-box{
background:rgba(255,255,255,.14);
padding:14px;
border-radius:18px;
text-align:center;
margin-bottom:18px;
}

#timer{
direction:ltr;
font-weight:700;
font-size:20px;
}

.big-heart{
font-size:44px;
text-align:center;
cursor:pointer;
margin:10px 0 14px;
transition:.3s;
}

.big-heart:hover{
transform:scale(1.15);
}

#secretMsg{
display:none;
text-align:center;
background:rgba(255,255,255,.14);
padding:12px;
border-radius:14px;
margin-bottom:16px;
}

/* أزرار */
.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:14px;
}

button.action{
border:none;
padding:12px;
border-radius:24px;
font-family:'Tajawal',sans-serif;
font-size:16px;
font-weight:700;
cursor:pointer;
background:#fff;
color:#ff4b7d;
transition:.2s;
}

button.action:hover{
transform:translateY(-2px);
}

#dailyMsgBox{
display:none;
margin-bottom:14px;
background:rgba(255,255,255,.14);
padding:12px;
border-radius:14px;
text-align:center;
line-height:1.7;
}

.footer-note{
margin-top:18px;
text-align:center;
font-style:italic;
}

.watermark{
margin-top:18px;
text-align:center;
font-size:12px;
opacity:.75;
}

/* popup */
#popup,#welcomePopup{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.55);
z-index:9999;
padding:20px;
}

.popup-box{
background:#fff;
color:#ff4b7d;
padding:22px;
border-radius:24px;
max-width:330px;
width:100%;
text-align:center;
font-size:22px;
font-weight:700;
line-height:1.7;
}

/* عناصر طائرة */
.float-item{
position:fixed;
pointer-events:none;
z-index:1;
animation:rise linear forwards;
}

@keyframes rise{
0%{
transform:translateY(0) scale(.8);
opacity:1;
}
100%{
transform:translateY(-130vh) scale(1.4) rotate(360deg);
opacity:0;
}
}

/* قلب مكان الضغط */
.tap-heart{
position:fixed;
pointer-events:none;
font-size:28px;
animation:tapHeart .9s forwards;
z-index:99999;
}

@keyframes tapHeart{
0%{transform:translate(-50%,-50%) scale(.5);opacity:1}
100%{transform:translate(-50%,-120px) scale(1.6);opacity:0}
}

@media(max-width:600px){
.buttons{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="bg-layer"></div>

<!-- شاشة التحميل -->
<div id="loadingScreen">
<div>جارٍ تحميل كمية الحب... ❤️</div>
<div class="loadbar"><div class="loadfill"></div></div>
<div id="loadPercent">0%</div>
</div>

<!-- شاشة البداية -->
<div id="overlay">
<button onclick="startEverything()">إضغطي هنا يا ديدا ❤️</button>
</div>

<!-- المحتوى -->
<div class="container" id="mainContainer">

<h1 id="mainTitle">لأجمل ديدا في الدنيا 🫶❤️</h1>

<p class="intro" id="typedText"></p>

<div class="counter-box">
<span>إحنا مع بعض بقالنا:</span>
<div id="timer">تحميل...</div>
</div>

<div class="big-heart" onclick="showSecret()">❤️</div>

<div id="secretMsg">أنا هفضل أحبك طول العمر ❤️</div>

<div class="buttons">
<button class="action" onclick="dailyMessage()">رسالة اليوم ❤️</button>
<button class="action" onclick="openGift()">افتحي المفاجأة 🎁</button>
</div>

<div id="dailyMsgBox"></div>

<p class="footer-note" id="timeMsg"></p>

<div class="watermark">صُنعت بكل الحب بواسطة قلبوا ❤️</div>

</div>

<!-- مفاجأة -->
<div id="popup" onclick="closeGift()">
<div class="popup-box">
أنا محظوظ إنك في حياتي ❤️<br>
الجاي أجمل طول ما انتي معايا ✨
</div>
</div>

<!-- ترحيب -->
<div id="welcomePopup">
<div class="popup-box">
مرحبًا بأجمل ديدا في الدنيا ❤️
</div>
</div>

<audio id="myAudio" loop>
<source src="kazdoura.mp3" type="audio/mpeg">
</audio>

<script>
const overlay = document.getElementById("overlay");
const loading = document.getElementById("loadingScreen");
const percent = document.getElementById("loadPercent");
const mainContainer = document.getElementById("mainContainer");
const typedText = document.getElementById("typedText");
const timer = document.getElementById("timer");
const popup = document.getElementById("popup");
const welcome = document.getElementById("welcomePopup");
const audio = document.getElementById("myAudio");
const timeMsg = document.getElementById("timeMsg");

const startDate = new Date("2024-11-24T00:00:00");

const introText="من يوم ما دخلتي حياتي والدنيا بقت أهدى وأحلى وليها طعم تاني.. أنا بحبك أكتر بكتير مما تتخيلي ❤️";

const messages=[
"وجودك في حياتي نعمة كبيرة ❤️",
"كل يوم معاكي بحبك أكتر 😍",
"أجمل صدفة حصلتلي إني عرفتك 💖",
"إنتي راحتي وسندي وكل دنيتي 🫶",
"أنا فخور بيكي ❤️"
];

/* تحميل */
let p=0;
let loadInt=setInterval(()=>{
p+=5;
percent.innerText=p+"%";
if(p>=100){
clearInterval(loadInt);
setTimeout(()=>{
loading.style.display="none";
overlay.style.display="flex";
},400);
}
},130);

/* تشغيل */
function startEverything(){
overlay.style.display="none";
mainContainer.classList.add("show");

audio.volume=.35;
audio.play().catch(()=>{});

typeWriter();
updateTimer();
timeMessage();
nightMode();
birthdayCheck();

setInterval(updateTimer,1000);
setInterval(createSpark,700); /* نجوم أكثر */
setInterval(createHeart,2200); /* قلوب أقل */
}

/* كتابة */
function typeWriter(i=0){
if(i<introText.length){
typedText.innerHTML+=introText.charAt(i);
setTimeout(()=>typeWriter(i+1),35);
}
}

/* العداد */
function updateTimer(){
let now=new Date();
let diff=now-startDate;
let d=Math.floor(diff/86400000);
let h=Math.floor(diff/3600000)%24;
let m=Math.floor(diff/60000)%60;
let s=Math.floor(diff/1000)%60;
timer.innerText=`${d} يوم، ${h} ساعة، ${m} دقيقة، ${s} ثانية`;
}

/* رسالة الوقت */
function timeMessage(){
let h=new Date().getHours();
if(h<12) timeMsg.innerText="صباح الخير يا أجمل بداية ❤️";
else if(h<18) timeMsg.innerText="نص اليوم عدى ولسه بحبك أكتر 😍";
else timeMsg.innerText="تصبحي على حب أكتر من امبارح ❤️";
}

/* وضع ليلي */
function nightMode(){
let h=new Date().getHours();
if(h>=0 && h<7){
document.body.classList.add("night");
}
}

/* عيد الميلاد */
function birthdayCheck(){
let now=new Date();
if(now.getDate()==20 && now.getMonth()==5){
document.getElementById("mainTitle").innerText="🎂 كل سنة وإنتي أجمل سنيني ❤️";
}
}

/* رسالة يومية */
function dailyMessage(){
let box=document.getElementById("dailyMsgBox");
box.style.display="block";
box.innerText=messages[Math.floor(Math.random()*messages.length)];
}

/* مفاجأة */
function openGift(){ popup.style.display="flex"; }
function closeGift(){ popup.style.display="none"; }

/* رسالة ترحيب أول دخول */
setTimeout(()=>{
welcome.style.display="flex";
setTimeout(()=>welcome.style.display="none",2500);
},3500);

/* نجوم */
function createSpark(){
let item=document.createElement("div");
item.className="float-item";
item.innerHTML=["✨","⭐","🌟"][Math.floor(Math.random()*3)];
item.style.left=Math.random()*100+"vw";
item.style.bottom="-20px";
item.style.fontSize=(12+Math.random()*14)+"px";
item.style.animationDuration=(4+Math.random()*3)+"s";
document.body.appendChild(item);
setTimeout(()=>item.remove(),7000);
}

/* قلوب */
function createHeart(){
let item=document.createElement("div");
item.className="float-item";
item.innerHTML=["❤️","💕","💖"][Math.floor(Math.random()*3)];
item.style.left=Math.random()*100+"vw";
item.style.bottom="-20px";
item.style.fontSize=(16+Math.random()*18)+"px";
item.style.animationDuration=(5+Math.random()*3)+"s";
document.body.appendChild(item);
setTimeout(()=>item.remove(),8000);
}

/* قلب مكان الضغط */
document.addEventListener("click",function(e){
let h=document.createElement("div");
h.className="tap-heart";
h.innerHTML="❤️";
h.style.left=e.clientX+"px";
h.style.top=e.clientY+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),900);
});

/* رسالة سرية */
function showSecret(){
document.getElementById("secretMsg").style.display="block";
}
</script>

</body>
</html>
